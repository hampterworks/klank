services:
  klank:
    build: .
    image: hampterworks/klank
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data        # tab library + git working tree
      - klank-config:/config # secrets/state (git PAT, ug device id) — kept out of the tabs repo
    restart: unless-stopped

volumes:
  klank-config:
