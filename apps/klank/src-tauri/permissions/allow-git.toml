[[permission]]
identifier = "allow-git"
description = "Allows the main window to use the in-app libgit2 sync commands."
commands.allow = [
  "git_is_repo",
  "git_status",
  "git_pull",
  "git_commit",
  "git_push",
  "git_unpushed",
  "git_clone",
  "git_set_token",
  "git_has_token",
  "git_sync",
  "git_list_branches",
  "git_checkout_branch",
  "git_is_authenticated",
  "git_system_credentials_enabled",
  "git_use_system_credentials",
  "git_disable_system_credentials",
]
