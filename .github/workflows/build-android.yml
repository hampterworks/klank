name: Build Android

# SHA-pinning of actions can be applied later per the cicd-harden convention.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      debug_build:
        description: "Build a debug APK (true) or release APK (false)"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  # -----------------------------------------------------------------------
  # Debug build — opt-in via the 'build-android' PR label or workflow_dispatch
  # -----------------------------------------------------------------------
  android-debug:
    name: Android debug APK
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.debug_build != 'false') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-android'))

    steps:
      - uses: actions/checkout@v4

      # JDK 17 is required by the Android Gradle toolchain.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Installs the Android SDK command-line tools; NDK 27 is installed below.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: |
          sdkmanager "ndk;27.0.12077973"
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/27.0.12077973"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"

      # Vendored OpenSSL (pulled in by git2) cross-compiles with the NDK, but its
      # makefile invokes legacy per-target tool names (e.g.
      # aarch64-linux-android-ranlib) that NDK r23+ replaced with llvm-ranlib /
      # llvm-ar. Put the NDK llvm bin on PATH and alias the legacy names so the
      # OpenSSL `install_dev` step succeeds.
      - name: Alias NDK toolchain for vendored OpenSSL
        run: |
          NDK_BIN="${ANDROID_SDK_ROOT}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$NDK_BIN" >> "$GITHUB_PATH"
          for prefix in aarch64-linux-android armv7a-linux-androideabi arm-linux-androideabi i686-linux-android x86_64-linux-android; do
            ln -sf "$NDK_BIN/llvm-ranlib" "$NDK_BIN/${prefix}-ranlib"
            ln -sf "$NDK_BIN/llvm-ar" "$NDK_BIN/${prefix}-ar"
          done

      # Reads the pnpm version from packageManager in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Stable Rust with the arm64 Android cross-compilation target only, to
      # match the arm64-v8a APK produced by release.yml.
      - name: Set up Rust with Android arm64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # Cache Cargo registry and the Tauri crate build artifacts.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/klank/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --target aarch64 builds only the arm64 product flavor; combined with the
      # debug build type's default symbol stripping this keeps the debug APK small.
      - name: Build Android (debug, arm64)
        run: pnpm tauri android build --debug --apk --target aarch64
        working-directory: apps/klank

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klank-debug-apk
          path: apps/klank/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      # Post or update a sticky PR comment so the APK is easy to find.
      - name: Post PR comment with artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### Android debug APK',
              '',
              `A **debug APK** was built for this PR and is attached as the \`klank-debug-apk\` artifact on the workflow run.`,
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              '_Download the artifact from the run page linked above (requires GitHub login)._',
            ].join('\n');

            const marker = '<!-- klank-android-build-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

  # -----------------------------------------------------------------------
  # Release build — ad-hoc, opt-in via workflow_dispatch with debug_build set
  # to 'false'. The canonical release path (attached to a GitHub Release) lives
  # in release.yml; this job is for manually testing a release APK off-cycle.
  # -----------------------------------------------------------------------
  android-release:
    name: Android release APK
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.debug_build == 'false'

    steps:
      - uses: actions/checkout@v4

      # JDK 17 is required by the Android Gradle toolchain.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Installs the Android SDK command-line tools; NDK 27 is installed below.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: |
          sdkmanager "ndk;27.0.12077973"
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/27.0.12077973"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"

      # Vendored OpenSSL (pulled in by git2) cross-compiles with the NDK, but its
      # makefile invokes legacy per-target tool names (e.g.
      # aarch64-linux-android-ranlib) that NDK r23+ replaced with llvm-ranlib /
      # llvm-ar. Put the NDK llvm bin on PATH and alias the legacy names so the
      # OpenSSL `install_dev` step succeeds.
      - name: Alias NDK toolchain for vendored OpenSSL
        run: |
          NDK_BIN="${ANDROID_SDK_ROOT}/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$NDK_BIN" >> "$GITHUB_PATH"
          for prefix in aarch64-linux-android armv7a-linux-androideabi arm-linux-androideabi i686-linux-android x86_64-linux-android; do
            ln -sf "$NDK_BIN/llvm-ranlib" "$NDK_BIN/${prefix}-ranlib"
            ln -sf "$NDK_BIN/llvm-ar" "$NDK_BIN/${prefix}-ar"
          done

      # Reads the pnpm version from packageManager in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Stable Rust with the arm64 Android cross-compilation target only, to
      # match the arm64-v8a release APK produced by release.yml.
      - name: Set up Rust with Android arm64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # Cache Cargo registry and the Tauri crate build artifacts.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/klank/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Decode the release signing keystore and write the properties file that
      # gen/android/app/build.gradle.kts reads its signingConfig from. Without
      # this the release build type has no signingConfig and produces an
      # unsigned APK that can't be installed on a device.
      - name: Create keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/klank/src-tauri/my-release-key.keystore

      - name: Create keystore.properties
        run: |
          cat > apps/klank/src-tauri/gen/android/keystore.properties << EOF
          storeFile=../../../my-release-key.keystore
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS || 'my-app' }}
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      # --target aarch64 builds only the arm64 product flavor, matching the
      # release APK distributed via release.yml.
      - name: Build Android (release, arm64)
        run: pnpm tauri android build --apk --target aarch64
        working-directory: apps/klank

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klank-release-apk
          path: apps/klank/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
