name: Build Windows Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from packageManager in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/klank/src-tauri -> target

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows installers
        run: pnpm tauri:build:windows

      - uses: actions/upload-artifact@v4
        with:
          name: klank-nsis
          path: apps/klank/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: klank-msi
          path: apps/klank/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
